<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SORRY, dog | Apology COMING SOON</title>

    <link rel="shortcut icon" href="/favicon.svg" type="image/x-icon" />
    <link rel="icon" href="/favicon.svg" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #eeeeee;
        margin: 0px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-direction: column;
        height: 100vh;
        font-family: "Inter", sans-serif;
      }

      .content-container {
        align-items: center;
        justify-content: space-between;
        flex-direction: column;
        flex: 1 1;
        width: 100%;
        height: 100%;
        margin: 20px;
      }

      .center-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      img.sorry-dog-logo {
        max-width: 20vw;
        max-height: 20vh;
        width: auto;
        height: auto;
        max-width: 369px;
        animation: fadeIn 8s;
        margin-bottom: 20px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      .loading-bar {
        width: 120%;
        max-width: 420px;
        height: 20px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 20px;
        animation: fadeIn 2s 2s forwards;
        opacity: 0;
        /* delay of 8s to start after icon_logo */
      }

      .loading-bar-inner {
        width: 69%;
        height: 100%;
        background: linear-gradient(
          -45deg,
          #888 25%,
          transparent 25%,
          transparent 50%,
          #888 50%,
          #888 75%,
          transparent 75%,
          transparent
        );
        background-size: 56.57px 56.57px;
        /* sqrt(2) * 40px */
        animation: swirl 2s linear infinite;
      }

      @keyframes swirl {
        0% {
          background-position: 0 0;
        }

        100% {
          background-position: 56.57px 56.57px;
        }
      }

      @keyframes flash {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.42069;
        }
      }

      p.loading-text {
        color: #030090;
        font-weight: bold;
        margin: 0;
        opacity: 0;
        animation: flashText 1.5s infinite alternate;
        animation-delay: 6s;
      }

      @keyframes flashText {
        from {
          opacity: 0.2;
        }

        to {
          opacity: 0.9;
        }
      }

      span.dot {
        opacity: 0;
        animation: flashDot 3s infinite;
      }

      span.dot:nth-child(2) {
        animation-delay: 1s;
      }

      span.dot:nth-child(3) {
        animation-delay: 2s;
      }

      @keyframes flashDot {
        0%,
        96% {
          opacity: 0.01;
        }

        12.5%,
        96.1% {
          opacity: 1;
        }

        96.2%,
        99% {
          opacity: 0.01;
        }

        100% {
          opacity: 0;
        }
      }

      .spacer {
        flex: 1 1;
        width: 20px;
      }

      @media (max-width: 768px) {
        img.sorry-dog-logo {
          max-width: 169px;
        }
        .loading-bar {
          min-width: 220px;
        }
      }
    </style>
  </head>

  <body>
    <div class="spacer"></div>

    <div class="center-container">
      <!-- LOGO -->
      <img
        src="/img/sorry-dog.svg"
        alt="SORRY dog logo"
        class="sorry-dog-logo"
        onerror="this.onerror=null; this.src='/img/sorry-dog.png';"
      />

      <!-- LOADING BAR -->
      <div class="loading-bar">
        <div class="loading-bar-inner"></div>
      </div>

      <!-- LOADING TEXT... -->
      <p class="loading-text text-fadein">
        Meme apology coming soon
        <span class="dot">.</span>
        <span class="dot">.</span>
        <span class="dot">.</span>
      </p>

    </div>
    <!-- END center-container -->


    <div class="spacer"></div>

  </body>
</html>
